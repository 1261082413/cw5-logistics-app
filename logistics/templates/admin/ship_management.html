{% extends "admin/admin_base.html" %}
{% block admin_content %}
<h3 class="fw-bold mb-3">Shipment management</h3>

{% if orders %}
  <div class="table-responsive">
    <table class="table align-middle">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Status</th>
          <th class="text-end">Action</th>
        </tr>
      </thead>
      <tbody>
        {% for o in orders %}
        <tr>
          <td>#{{ o.id }}</td>
          <td>{{ o.get_status_display }}</td>
          <td class="text-end">
            <a class="btn btn-sm btn-outline-primary"
               href="{% url 'admin_ship_detail' o.id %}">
              check details
            </a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% else %}
  <p class="help-text mb-0">No shipments yet.</p>
{% endif %}
{% endblock %}
