<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Logistics{% endblock %}</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  {% load static %}
  <link rel="stylesheet" href="{% static 'logistics/app.css' %}">
</head>

<body class="bg-soft">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{% url 'home' %}">Logistics</a>
      <div class="ms-auto">
        {% if user.is_authenticated %}
          <a class="btn btn-outline-light btn-sm" href="{% url 'dashboard' %}">Dashboard</a>
          <a class="btn btn-warning btn-sm ms-2" href="{% url 'logout' %}">Logout</a>
        {% else %}
          <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>
          <a class="btn btn-primary btn-sm ms-2" href="{% url 'signup' %}">Register</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
